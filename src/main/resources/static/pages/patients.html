<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patients</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: url('https://images.unsplash.com/photo-1588776814546-2ee061da24d1?auto=format&fit=crop&w=1470&q=80');
      background-size: cover;
      color: #333;
    }
    h2 {
      color: #004080;
      text-align: center;
      text-shadow: 1px 1px 2px #fff;
      margin-bottom: 30px;
    }
    form {
      margin-bottom: 30px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: center;
      background-color: rgba(255, 255, 255, 0.9);
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    form input, form button {
      padding: 10px;
      font-size: 14px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    form button {
      background-color: #008CBA;
      color: white;
      border: none;
      cursor: pointer;
      transition: background 0.3s;
    }
    form button:hover { background-color: #005f75; }
    table {
      width: 100%;
      border-collapse: collapse;
      background-color: rgba(255, 255, 255, 0.95);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      border-radius: 10px;
      overflow: hidden;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 12px;
      text-align: center;
    }
    th { background-color: #008CBA; color: white; }
    tr:nth-child(even) { background-color: rgba(0,0,0,0.03); }
    button.delete-btn {
      background-color: #f44336;
      color: white;
      border: none;
      padding: 6px 12px;
      cursor: pointer;
      transition: background 0.3s;
      border-radius: 5px;
    }
    button.delete-btn:hover { background-color: #d32f2f; }
  </style>
</head>
<body>
<h2>Patients</h2>

<form id="add-patient-form">
  <input type="text" id="patient-name" placeholder="Name" required>
  <input type="number" id="patient-age" placeholder="Age" required>
  <input type="text" id="patient-phone" placeholder="Phone" required>
  <input type="email" id="patient-email" placeholder="Email" required>
  <button type="submit">Add Patient</button>
</form>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>Name</th>
      <th>Age</th>
      <th>Phone</th>
      <th>Email</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="patients-table"></tbody>
</table>

<script>
let patientCounter = 0;

function loadPatients() {
  fetch('/api/patients')
    .then(res => res.json())
    .then(patients => {
      const table = document.getElementById('patients-table');
      table.innerHTML = '';
      patientCounter = 0;
      patients.forEach(p => {
        patientCounter++;
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${patientCounter}</td>
          <td>${p.name}</td>
          <td>${p.age}</td>
          <td>${p.phone}</td>
          <td>${p.email}</td>
          <td><button class="delete-btn" onclick="deletePatient(${p.id})">Delete</button></td>
        `;
        table.appendChild(row);
      });
    });
}

document.getElementById('add-patient-form').addEventListener('submit', function(e){
  e.preventDefault();
  const data = {
    name: document.getElementById('patient-name').value,
    age: parseInt(document.getElementById('patient-age').value),
    phone: document.getElementById('patient-phone').value,
    email: document.getElementById('patient-email').value
  };
  fetch('/api/patients', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  }).then(() => { this.reset(); loadPatients(); });
});

function deletePatient(id) {
  if(confirm('Are you sure you want to delete this patient?')) {
    fetch(`/api/patients/${id}`, { method: 'DELETE' })
      .then(() => loadPatients());
  }
}

loadPatients();
</script>

</body>
</html>
