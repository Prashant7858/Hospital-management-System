<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Diabetes Prediction</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background-color: #f4f7f6; }
        .ai-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        .ai-card h3 { color: #333; margin-bottom: 20px; }
        .ai-form input {
            display: block;
            width: 100%;
            margin: 15px 0;
            padding: 12px;
            border: 2px solid #eee; /* Visible border */
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .ai-form input:focus { border-color: #00bfff; outline: none; }
        .ai-form button {
            width: 100%;
            padding: 15px;
            background: #00bfff;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }
        .ai-form button:hover { background: #008CBA; }
        #result { margin-top: 25px; padding: 15px; border-radius: 8px; font-weight: bold; min-height: 24px; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>

<div class="ai-card">
    <h3>Diabetes Prediction</h3>
    <div class="ai-form">
        <input type="number" id="age" placeholder="Age" required>
        <input type="number" id="bmi" placeholder="BMI (e.g. 25.5)" step="0.1" required>
        <input type="number" id="glucose" placeholder="Glucose Level" required>
        <input type="number" id="hba1c" placeholder="HbA1c Level" step="0.1" required>

        <button type="button" onclick="predict()">Predict Now</button>
        <div id="result"></div>
    </div>
</div>

<script>
async function predict() {
    const resDiv = document.getElementById("result");
    const inputs = {
        age: document.getElementById("age").value,
        bmi: document.getElementById("bmi").value,
        glucose: document.getElementById("glucose").value,
        hba1c: document.getElementById("hba1c").value
    };

    if (Object.values(inputs).some(v => !v)) {
        resDiv.className = "error";
        resDiv.innerText = "⚠️ Please fill all fields";
        return;
    }

    resDiv.className = "";
    resDiv.innerText = "⏳ Processing...";

    try {
        const response = await fetch("http://localhost:8080/api/predict-diabetes", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                features: [
                    parseFloat(inputs.age),
                    parseFloat(inputs.bmi),
                    parseFloat(inputs.glucose),
                    parseFloat(inputs.hba1c)
                ]
            })
        });

        const data = await response.json();
        
        if (response.ok) {
            resDiv.className = data.prediction === 1 ? "error" : "success";
            resDiv.innerText = data.message || (data.prediction === 1 ? "High Risk" : "Low Risk");
        } else {
            throw new Error(data.error || "Server error");
        }
    } catch (error) {
        resDiv.className = "error";
        resDiv.innerText = "❌ Error: " + error.message;
        console.error("Fetch error:", error);
    }
}
</script>
</body>
</html>
