<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Appointments</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f7f9;
    margin: 0;
    padding: 25px;
}

h2 {
    text-align: center;
    color: #0b4c8c;
    margin-bottom: 25px;
}

.form-box {
    background: #fff;
    padding: 14px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
}

.form-box select,
.form-box input {
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 13px;
}

.form-box button {
    background: #0b7fab;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 4px;
    cursor: pointer;
}

.form-box button:hover {
    background: #095f82;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

th {
    background: #0b7fab;
    color: white;
    padding: 12px;
    font-size: 14px;
}

td {
    padding: 10px;
    text-align: center;
    border: 1px solid #ddd;
    font-size: 14px;
}

.action-btn {
    border: none;
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
}

.delete {
    background: #f44336;
    color: white;
}
</style>
</head>

<body>

<h2>Appointments</h2>

<div class="form-box">
    <select id="patientSelect">
        <option value="">Select Patient</option>
    </select>

    <select id="doctorSelect">
        <option value="">Select Doctor</option>
    </select>

    <input type="date" id="date">
    <input type="time" id="time">
    <input type="text" id="reason" placeholder="Reason">

    <button onclick="addAppointment()">Add Appointment</button>
</div>

<table>
    <thead>
        <tr>
            <th>#</th>
            <th>Patient</th>
            <th>Doctor</th>
            <th>Date</th>
            <th>Time</th>
            <th>Reason</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script>
const APPOINTMENT_API = "http://localhost:8080/api/appointments";
const PATIENT_API = "http://localhost:8080/api/patients";
const DOCTOR_API = "http://localhost:8080/api/doctors";

// LOAD PATIENTS
async function loadPatients() {
    try {
        const res = await fetch(PATIENT_API);
        const data = await res.json();

        console.log("Patients:", data);

        const select = document.getElementById("patientSelect");
        select.innerHTML = '<option value="">Select Patient</option>';

        data.forEach(p => {
            const patientName = p.name || p.patientName;
            if (patientName) {
                select.innerHTML += `<option value="${patientName}">${patientName}</option>`;
            }
        });
    } catch (error) {
        console.error("Error loading patients:", error);
    }
}

// LOAD DOCTORS
async function loadDoctors() {
    try {
        const res = await fetch(DOCTOR_API);
        const data = await res.json();

        console.log("Doctors:", data);

        const select = document.getElementById("doctorSelect");
        select.innerHTML = '<option value="">Select Doctor</option>';

        data.forEach(d => {
            const doctorName = d.name || d.doctorName;
            if (doctorName) {
                select.innerHTML += `<option value="${doctorName}">${doctorName}</option>`;
            }
        });
    } catch (error) {
        console.error("Error loading doctors:", error);
    }
}

// LOAD APPOINTMENTS
async function loadAppointments() {
    try {
        const res = await fetch(APPOINTMENT_API);
        const data = await res.json();

        console.log("Appointments:", data);

        const table = document.getElementById("tableBody");
        table.innerHTML = "";

        data.forEach((a, index) => {
            table.innerHTML += `
            <tr>
                <td>${index + 1}</td>
                <td>${a.patientName || "-"}</td>
                <td>${a.doctorName || "-"}</td>
                <td>${a.date || "-"}</td>
                <td>${a.time || "-"}</td>
                <td>${a.reason || "-"}</td>
                <td>
                    <button class="action-btn delete" onclick="deleteAppointment(${a.id})">Delete</button>
                </td>
            </tr>`;
        });
    } catch (error) {
        console.error("Error loading appointments:", error);
    }
}

// ADD APPOINTMENT
async function addAppointment() {
    const appointment = {
        patientName: document.getElementById("patientSelect").value,
        doctorName: document.getElementById("doctorSelect").value,
        date: document.getElementById("date").value,
        time: document.getElementById("time").value,
        reason: document.getElementById("reason").value
    };

    try {
        await fetch(APPOINTMENT_API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(appointment)
        });

        loadAppointments();

        document.getElementById("patientSelect").value = "";
        document.getElementById("doctorSelect").value = "";
        document.getElementById("date").value = "";
        document.getElementById("time").value = "";
        document.getElementById("reason").value = "";

    } catch (error) {
        console.error("Error adding appointment:", error);
    }
}

// DELETE APPOINTMENT
async function deleteAppointment(id) {
    try {
        await fetch(APPOINTMENT_API + "/" + id, {
            method: "DELETE"
        });

        loadAppointments();
    } catch (error) {
        console.error("Error deleting appointment:", error);
    }
}

// AUTO LOAD
loadPatients();
loadDoctors();
loadAppointments();
</script>

</body>
</html>
