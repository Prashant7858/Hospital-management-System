name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build project
        run: mvn clean package -DskipTests

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "target/*.jar"
          target: "/home/ubuntu"
          # IMPORTANT: This prevents the 'target' folder from being created on EC2
          strip_components: 1 

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # 1. Kill the old app gracefully
            sudo pkill -f 'java -jar' || true
            
            # 2. Go to the home directory
            cd /home/ubuntu
            
            # 3. Start the app and fully detach it from the GitHub session
            # We use 'disown' so GitHub can exit successfully while the app keeps running
            nohup java -jar *.jar > app.log 2>&1 & 
            sleep 5
            disown